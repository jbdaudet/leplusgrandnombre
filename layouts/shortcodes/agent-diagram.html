<div id="agent-graph" style="width:100%;max-width:940px;margin:2rem auto;position:relative;overflow:hidden"></div>

<script type="module">
import * as d3 from 'https://cdn.jsdelivr.net/npm/d3@7/+esm';

const container = document.getElementById('agent-graph');
const isMobile = window.innerWidth < 640;

/* ── Data ── */
const nodes = [
  { id:'question',    label:'Question utilisateur',   type:'pill',   detail:'En langage naturel, en français.\nEx : « Évolution du mix énergétique en France ? »', tier:0 },
  { id:'classifieur', label:'Classifieur',             type:'agent-accent', detail:'Lit la question et la classe : chiffre factuel, question complexe, opinion ou métadonnée. Chaque type active un agent spécialisé.', tier:1 },
  { id:'tactique',    label:'Agent tactique',           type:'agent',  detail:'« Consommation d\'énergie de la France ? »\nIdentifie la métrique, demande les données à l\'agent data, choisit le graphique adapté.', tier:2 },
  { id:'strategique', label:'Agent stratégique',        type:'agent',  detail:'« Pourquoi les émissions baissent en Europe ? »\nDécompose en sous-questions, appelle l\'agent data pour chacune, puis synthétise.', tier:2 },
  { id:'expert',      label:'Agent expert',             type:'agent',  detail:'« Que pense Jancovici du nucléaire ? »\nPas de données chiffrées. Cherche dans les convictions et le corpus, répond dans la voix de l\'expert.', tier:2 },
  { id:'data',        label:'Agent data',               type:'agent-accent', detail:'Consulte le dictionnaire des données. Cherche d\'abord dans la couche sémantique (SQL déterministe). Si métrique inconnue → fallback Text-to-SQL validé par EXPLAIN.', tier:3 },
  { id:'semantique',  label:'Couche sémantique',        type:'source', detail:'Catalogue YAML : chaque métrique décrite avec sa table, formule, dimensions, filtres. L\'IA choisit, le code assemble le SQL.\nZéro hallucination.', tier:4 },
  { id:'fallback',    label:'Fallback Text-to-SQL',     type:'source', detail:'Si la métrique n\'est pas au catalogue, l\'IA génère du SQL PostgreSQL, validé par EXPLAIN avant exécution.', tier:4 },
  { id:'dictionnaire',label:'Dictionnaire',             type:'source', detail:'Description de chaque table, colonne et valeur possible. Permet à l\'agent data de comprendre la base sans inventer de colonnes.', tier:4 },
  { id:'corpus',      label:'Corpus',                   type:'source-accent', detail:'10 interviews transcrites, ~270 segments, embeddings pgvector. Récupération en 4 niveaux par similarité sémantique.', tier:3 },
  { id:'persona',     label:'Persona',                  type:'source-accent', detail:'34 convictions extraites par clustering (BERTopic). Lexique, anti-lexique, tics verbaux injectés dans chaque réponse.', tier:4 },
  { id:'viz',         label:'Visualisation auto',        type:'agent',  detail:'Choisit le graphique selon les données : courbe, barres, carte KPI ou tableau.', tier:5 },
  { id:'analyse',     label:'Analyse incarnée',          type:'agent-accent', detail:'Commente les chiffres avec le style, les convictions et les analogies de la persona. Propose les prochaines étapes.', tier:5 },
  { id:'reponse',     label:'Réponse + graphique + analyse', type:'cta', detail:'', tier:6 }
];

const links = [
  { source:'question',    target:'classifieur', label:'' },
  { source:'classifieur', target:'tactique',    label:'un chiffre' },
  { source:'classifieur', target:'strategique', label:'complexe' },
  { source:'classifieur', target:'expert',      label:'opinion' },
  { source:'tactique',    target:'data',        label:'' },
  { source:'strategique', target:'data',        label:'' },
  { source:'data',        target:'semantique',  label:'' },
  { source:'data',        target:'fallback',    label:'si inconnu', dashed:true },
  { source:'data',        target:'dictionnaire',label:'' },
  { source:'expert',      target:'corpus',      label:'', accent:true },
  { source:'corpus',      target:'persona',     label:'', accent:true },
  { source:'semantique',  target:'viz',         label:'' },
  { source:'fallback',    target:'viz',         label:'', dashed:true },
  { source:'viz',         target:'analyse',     label:'' },
  { source:'persona',     target:'analyse',     label:'', accent:true },
  { source:'persona',     target:'expert',      label:'', accent:true, dashed:true },
  { source:'analyse',     target:'reponse',     label:'', accent:true }
];

/* ── Dimensions ── */
const W = container.clientWidth;
const nodeW = isMobile ? 130 : 160;
const nodeH = isMobile ? 44 : 48;
const tierSpacing = isMobile ? 90 : 100;
const H = (7 * tierSpacing) + 40;
container.style.height = H + 'px';

/* ── Colors ── */
const C = {
  accent:'#FF6B35', accentBg:'#FFF0E9', border:'#e0e0e4',
  text:'#1a1a1a', muted:'#5c5c66', faint:'#9c9ca6', bg:'#fafafa', white:'#fff'
};

/* ── SVG setup ── */
const svg = d3.select(container).append('svg')
  .attr('width', W).attr('height', H)
  .style('position','absolute').style('top',0).style('left',0)
  .style('pointer-events','none');

const defs = svg.append('defs');
['gray','accent'].forEach(t => {
  defs.append('marker').attr('id','arrow-'+t)
    .attr('viewBox','0 0 10 7').attr('refX',10).attr('refY',3.5)
    .attr('markerWidth',7).attr('markerHeight',5).attr('orient','auto-start-reverse')
    .append('path').attr('d','M0 0 L10 3.5 L0 7z')
    .attr('fill', t==='accent' ? C.accent : C.faint);
});

/* ── Force simulation ── */
const sim = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d=>d.id).distance(tierSpacing * 0.8).strength(0.4))
  .force('charge', d3.forceManyBody().strength(-300))
  .force('x', d3.forceX(W/2).strength(0.12))
  .force('y', d3.forceY(d => 20 + d.tier * tierSpacing).strength(0.8))
  .force('collide', d3.forceCollide(nodeW * 0.6))
  .alphaDecay(0.03);

/* ── Link elements ── */
const linkEls = svg.selectAll('.link').data(links).join('line')
  .attr('class','link')
  .attr('stroke', d => d.accent ? C.accent : C.faint)
  .attr('stroke-width', 1.2)
  .attr('stroke-dasharray', d => d.dashed ? '5 3' : null)
  .attr('marker-end', d => d.accent ? 'url(#arrow-accent)' : 'url(#arrow-gray)')
  .style('pointer-events','none');

/* ── Link labels ── */
const linkLabels = svg.selectAll('.link-label').data(links.filter(d=>d.label)).join('text')
  .attr('class','link-label')
  .text(d=>d.label)
  .attr('font-size', isMobile ? 8 : 9)
  .attr('fill', C.faint)
  .attr('font-style','italic')
  .attr('text-anchor','middle')
  .attr('font-family','Raleway, sans-serif')
  .style('pointer-events','none');

/* ── Node DOM elements ── */
const nodeEls = d3.select(container).selectAll('.node').data(nodes).join('div')
  .attr('class','node')
  .style('position','absolute')
  .style('width', nodeW+'px')
  .style('padding', '8px 10px')
  .style('box-sizing','border-box')
  .style('border-radius', d => d.type==='pill'||d.type==='cta' ? '22px' : '10px')
  .style('text-align', d => d.type==='pill'||d.type==='cta' ? 'center' : 'left')
  .style('background', d => {
    if(d.type==='cta') return C.accent;
    if(d.type.includes('accent')) return C.accentBg;
    if(d.type.includes('source')) return C.bg;
    return C.white;
  })
  .style('border', d => {
    if(d.type==='cta') return 'none';
    if(d.type.includes('accent')) return '1px solid '+C.accent;
    if(d.type.includes('source')) return '1px dashed '+C.border;
    return '1px solid '+C.border;
  })
  .style('cursor','pointer')
  .style('font-family','Raleway, sans-serif')
  .style('transition','box-shadow 0.2s ease')
  .style('z-index', 2)
  .on('click', function(ev, d) {
    if(!d.detail) return;
    /* Toggle tooltip */
    const existing = container.querySelector('.tooltip-active');
    if(existing) existing.remove();
    const tip = document.createElement('div');
    tip.className = 'tooltip-active';
    tip.style.cssText = 'position:absolute;z-index:100;background:#fff;border:1px solid '+C.border+';border-radius:10px;padding:12px 14px;max-width:280px;font-family:Raleway,sans-serif;box-shadow:0 4px 20px rgba(0,0,0,0.12);pointer-events:auto';
    tip.style.left = Math.min(d.x + nodeW/2 + 10, W - 290) + 'px';
    tip.style.top = (d.y - 10) + 'px';
    tip.innerHTML = '<div style="font-size:12px;font-weight:600;color:'+C.text+';margin-bottom:6px">'+d.label+'</div>'
      + '<div style="font-size:11px;color:'+C.muted+';line-height:1.6;white-space:pre-line">'+d.detail+'</div>'
      + '<div style="font-size:9px;color:'+C.faint+';margin-top:8px;cursor:pointer" onclick="this.parentElement.remove()">✕ fermer</div>';
    container.appendChild(tip);
    ev.stopPropagation();
  });

/* Node inner HTML */
nodeEls.html(d => {
  const isAI = d.type.includes('agent');
  const isCta = d.type === 'cta';
  const titleColor = isCta ? '#fff' : C.text;
  const fontSize = isMobile ? 11 : 12;
  const icon = isAI ? '<svg viewBox="0 0 20 20" style="width:16px;height:16px;vertical-align:middle;margin-right:4px"><circle cx="10" cy="10" r="4" fill="none" stroke="'+C.accent+'" stroke-width="1.5"/><circle cx="10" cy="10" r="1.5" fill="'+C.accent+'"/><line x1="10" y1="2" x2="10" y2="6" stroke="'+C.accent+'" stroke-width="1.2" stroke-linecap="round"/><line x1="3.2" y1="14" x2="6.6" y2="12" stroke="'+C.accent+'" stroke-width="1.2" stroke-linecap="round"/><line x1="16.8" y1="14" x2="13.4" y2="12" stroke="'+C.accent+'" stroke-width="1.2" stroke-linecap="round"/><circle cx="10" cy="1.5" r="1.5" fill="'+C.accent+'"/><circle cx="2.5" cy="15" r="1.5" fill="'+C.accent+'"/><circle cx="17.5" cy="15" r="1.5" fill="'+C.accent+'"/></svg>' : '';
  const detailHint = d.detail ? '<div style="font-size:8px;color:'+C.faint+';margin-top:2px">cliquez pour détails</div>' : '';
  return icon + '<span style="font-size:'+fontSize+'px;font-weight:600;color:'+titleColor+'">'+d.label+'</span>' + detailHint;
});

/* ── Close tooltip on outside click ── */
document.addEventListener('click', () => {
  const t = container.querySelector('.tooltip-active');
  if(t) t.remove();
});

/* ── Tick ── */
sim.on('tick', () => {
  /* Clamp positions */
  nodes.forEach(d => {
    d.x = Math.max(nodeW/2, Math.min(W - nodeW/2, d.x));
    d.y = Math.max(nodeH/2, Math.min(H - nodeH/2, d.y));
  });

  nodeEls
    .style('left', d => (d.x - nodeW/2) + 'px')
    .style('top', d => (d.y - nodeH/2) + 'px');

  linkEls
    .attr('x1', d => d.source.x).attr('y1', d => d.source.y + nodeH/2)
    .attr('x2', d => d.target.x).attr('y2', d => d.target.y - nodeH/2);

  linkLabels
    .attr('x', d => (d.source.x + d.target.x) / 2)
    .attr('y', d => (d.source.y + nodeH/2 + d.target.y - nodeH/2) / 2);
});

/* ── Resize ── */
window.addEventListener('resize', () => {
  const newW = container.clientWidth;
  svg.attr('width', newW);
  sim.force('x', d3.forceX(newW/2).strength(0.12));
  sim.alpha(0.5).restart();
});
</script>
