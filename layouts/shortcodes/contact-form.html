<!-- Formspree Contact Form -->
<form action="https://formspree.io/f/xkovvejd" method="POST" class="contact-form">

  <div class="form-group">
    <label for="contact-firstname" class="form-label">Prénom *</label>
    <input
      type="text"
      id="contact-firstname"
      name="firstname"
      required
      class="form-input"
      placeholder="Votre prénom"
    />
  </div>

  <div class="form-group">
    <label for="contact-name" class="form-label">Nom *</label>
    <input
      type="text"
      id="contact-name"
      name="name"
      required
      class="form-input"
      placeholder="Votre nom"
    />
  </div>

  <div class="form-group">
    <label for="contact-email" class="form-label">Email *</label>
    <input
      type="email"
      id="contact-email"
      name="email"
      required
      class="form-input"
      placeholder="votre@email.fr"
    />
  </div>

  <div class="form-group">
    <label for="contact-role" class="form-label">Rôle *</label>
    <input
      type="text"
      id="contact-role"
      name="role"
      required
      class="form-input"
      placeholder="Votre fonction"
    />
  </div>

  <div class="form-group">
    <label for="contact-message" class="form-label">Parlez-nous de votre projet *</label>
    <textarea
      id="contact-message"
      name="message"
      required
      rows="4"
      class="form-textarea"
      placeholder="Partagez vos objectifs et vos besoins."
    ></textarea>
  </div>

  <!-- Honeypot for spam protection -->
  <input type="text" name="_gotcha" style="display:none" aria-hidden="true" />

  <div>
    <button type="submit" class="btn">Envoyer</button>
  </div>

</form>
