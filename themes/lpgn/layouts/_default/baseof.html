<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}" dir="{{ if .Site.Language.Params.rtl }}rtl{{ else }}ltr{{ end }}">
<head>
  {{- partial "head.html" . -}}
</head>
<body>
  {{/* The Focal Point — cursor glow (desktop only) */}}
  <div class="focal-point" aria-hidden="true"></div>

  <div class="site-wrapper">

    {{- partial "header.html" . -}}

    <main class="site-main" id="main-content" role="main">
      {{- block "main" . }}{{- end }}
    </main>

    {{- partial "footer.html" . -}}

  </div>

  <script>
    /* Burger menu */
    (function () {
      var burger = document.querySelector('.burger');
      var nav = document.getElementById('main-nav');
      if (!burger || !nav) return;

      function closeMenu() {
        burger.classList.remove('is-open');
        nav.classList.remove('is-open');
        burger.setAttribute('aria-expanded', 'false');
      }

      burger.addEventListener('click', function () {
        var isOpen = burger.classList.toggle('is-open');
        nav.classList.toggle('is-open', isOpen);
        burger.setAttribute('aria-expanded', String(isOpen));
      });

      nav.querySelectorAll('a').forEach(function (link) {
        link.addEventListener('click', closeMenu);
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeMenu();
      });
    })();

    /* Scroll reveal animations */
    (function () {
      var reveals = document.querySelectorAll('.reveal');
      if (!reveals.length) return;

      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

      reveals.forEach(function (el) { observer.observe(el); });

      /* Animated timeline line fill on scroll */
      var lineFill = document.querySelector('.journey__line-fill');
      var journey = document.querySelector('.journey');
      if (lineFill && journey) {
        function updateLine() {
          var rect = journey.getBoundingClientRect();
          var journeyTop = rect.top;
          var journeyHeight = rect.height;
          var viewportH = window.innerHeight;
          var scrolledInto = viewportH - journeyTop;
          var progress = Math.max(0, Math.min(1, scrolledInto / (journeyHeight + viewportH * 0.3)));
          lineFill.style.transform = 'scaleY(' + progress + ')';
        }
        window.addEventListener('scroll', updateLine, { passive: true });
        updateLine();
      }
    })();

    /* The Focal Point — cursor glow that follows the mouse (desktop only) */
    (function () {
      var fp = document.querySelector('.focal-point');
      if (!fp || window.matchMedia('(pointer: coarse)').matches) return;

      var mouseX = 0, mouseY = 0, fpX = 0, fpY = 0;
      var active = false;

      document.addEventListener('mousemove', function (e) {
        mouseX = e.clientX;
        mouseY = e.clientY;
        if (!active) {
          active = true;
          fp.classList.add('is-active');
          tick();
        }
      });

      document.addEventListener('mouseleave', function () {
        active = false;
        fp.classList.remove('is-active');
      });

      function tick() {
        if (!active) return;
        fpX += (mouseX - fpX) * 0.12;
        fpY += (mouseY - fpY) * 0.12;
        fp.style.left = fpX + 'px';
        fp.style.top = fpY + 'px';
        requestAnimationFrame(tick);
      }
    })();
  </script>

</body>
</html>
