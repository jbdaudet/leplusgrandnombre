<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}" dir="{{ if .Site.Language.Params.rtl }}rtl{{ else }}ltr{{ end }}">
<head>
  {{- partial "head.html" . -}}
</head>
<body>
  <div class="site-wrapper">

    {{- partial "header.html" . -}}

    <main class="site-main" id="main-content" role="main">
      {{- block "main" . }}{{- end }}
    </main>

    {{- partial "footer.html" . -}}

  </div>

  <script>
    /* Burger menu */
    (function () {
      var burger = document.querySelector('.burger');
      var nav = document.getElementById('main-nav');
      if (!burger || !nav) return;

      function closeMenu() {
        burger.classList.remove('is-open');
        nav.classList.remove('is-open');
        burger.setAttribute('aria-expanded', 'false');
      }

      burger.addEventListener('click', function () {
        var isOpen = burger.classList.toggle('is-open');
        nav.classList.toggle('is-open', isOpen);
        burger.setAttribute('aria-expanded', String(isOpen));
      });

      nav.querySelectorAll('a').forEach(function (link) {
        link.addEventListener('click', closeMenu);
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeMenu();
      });
    })();

    /* Scroll reveal animations */
    (function () {
      var reveals = document.querySelectorAll('.reveal');
      if (!reveals.length) return;

      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

      reveals.forEach(function (el) { observer.observe(el); });

      /* Continuous line: hero scroll track → journey timeline */
      var heroFill = document.querySelector('.hero__scroll-fill');
      var heroTrack = document.querySelector('.hero__scroll-track');
      var lineFill = document.querySelector('.journey__line-fill');
      var hero = document.querySelector('.hero');
      var journey = document.querySelector('.journey');

      if (hero && journey) {
        function updateLines() {
          var viewportH = window.innerHeight;

          /* Phase 1: Hero line fills as you scroll away from hero */
          if (heroFill && heroTrack) {
            var heroRect = hero.getBoundingClientRect();
            var trackRect = heroTrack.getBoundingClientRect();
            /* Start filling once user starts scrolling, complete before hero exits */
            var heroScrolled = -heroRect.top;
            var heroRange = heroRect.height - viewportH * 0.5;
            var heroProgress = Math.max(0, Math.min(1, heroScrolled / Math.max(heroRange, 1)));
            heroFill.style.transform = 'scaleY(' + heroProgress + ')';
          }

          /* Phase 2: Journey line fills as journey scrolls into view */
          if (lineFill) {
            var jRect = journey.getBoundingClientRect();
            var scrolledInto = viewportH - jRect.top;
            var jProgress = Math.max(0, Math.min(1, scrolledInto / (jRect.height + viewportH * 0.3)));
            lineFill.style.transform = 'scaleY(' + jProgress + ')';
          }
        }

        window.addEventListener('scroll', updateLines, { passive: true });
        updateLines();
      }
    })();

  </script>

</body>
</html>
