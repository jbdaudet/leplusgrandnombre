{{ define "main" }}
<div class="assembly">

  <header class="assembly__hero">
    <div class="container">
      <h1 class="assembly__title reveal reveal--from-bottom">{{ .Title }}</h1>
      {{- with .Description -}}
      <p class="assembly__label">// {{ . }}</p>
      {{- end -}}
    </div>
  </header>

  <div class="container">
    <div class="reading-width">
      <div class="page-content">
        {{ .Content }}
      </div>
    </div>
  </div>

</div>
{{ end }}
