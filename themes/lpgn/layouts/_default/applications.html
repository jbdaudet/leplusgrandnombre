{{ define "main" }}
<div class="applications">

  <header class="applications__hero reveal">
    <div class="container">
      <h1 class="applications__title">{{ .Title }}</h1>
      {{- with .Description -}}
      <p class="applications__intro">{{ . }}</p>
      {{- end -}}
    </div>
  </header>

  <div class="applications__content">
    <div class="container">
      {{ .Content }}
    </div>
  </div>

</div>

<script>
  /* Mermaid progressive reveal — nodes, arrows & labels appear one by one on scroll */
  (function () {
    function initMermaidReveal() {
      document.querySelectorAll('pre.mermaid svg, div.mermaid svg').forEach(function (svg) {
        if (svg.dataset.revealInit) return;
        svg.dataset.revealInit = '1';

        var nodes = Array.from(svg.querySelectorAll('.node'));
        var edges = Array.from(svg.querySelectorAll('.edgePath'));
        var labels = Array.from(svg.querySelectorAll('.edgeLabel'));
        /* Also catch arrow markers (the arrowhead tips) */
        var markers = Array.from(svg.querySelectorAll('marker'));

        /* Build ordered sequence: node, then its outgoing edge + label, then next node... */
        var items = [];
        var maxLen = Math.max(nodes.length, edges.length, labels.length);
        for (var i = 0; i < maxLen; i++) {
          if (i < nodes.length) items.push(nodes[i]);
          if (i < edges.length) items.push(edges[i]);
          if (i < labels.length) items.push(labels[i]);
        }

        if (!items.length) return;

        /* Set all items invisible */
        items.forEach(function (el) {
          el.style.opacity = '0';
          el.style.transition = 'opacity 0.4s ease';
        });
        /* Hide arrow markers too */
        markers.forEach(function (m) {
          m.style.opacity = '0';
          m.style.transition = 'opacity 0.4s ease';
        });

        var container = svg.closest('pre.mermaid') || svg.closest('div.mermaid') || svg.parentElement;

        function updateReveal() {
          var rect = container.getBoundingClientRect();
          var viewH = window.innerHeight;
          /*
           * Start revealing only when the diagram is 40% up from the bottom of the viewport.
           * Complete when it reaches 30% from the top.
           * This means items start appearing well before the reader "arrives" at the diagram.
           */
          var triggerStart = viewH * 0.6;  /* diagram top must be above this line to start */
          var triggerEnd = viewH * 0.3;    /* fully revealed when diagram top reaches here */
          var progress = Math.max(0, Math.min(1, (triggerStart - rect.top) / (triggerStart - triggerEnd)));
          var showCount = Math.round(progress * items.length);

          items.forEach(function (el, idx) {
            el.style.opacity = idx < showCount ? '1' : '0';
          });
          /* Show markers as soon as any edge is visible */
          var markersVisible = showCount > 1 ? '1' : '0';
          markers.forEach(function (m) { m.style.opacity = markersVisible; });
        }

        window.addEventListener('scroll', updateReveal, { passive: true });
        updateReveal();
      });
    }

    /* Mermaid renders async — wait for it, then init reveal */
    var checkInterval = setInterval(function () {
      var svgs = document.querySelectorAll('pre.mermaid svg, div.mermaid svg');
      if (svgs.length > 0) {
        clearInterval(checkInterval);
        setTimeout(initMermaidReveal, 100);
      }
    }, 200);

    /* Safety: stop checking after 10s */
    setTimeout(function () { clearInterval(checkInterval); }, 10000);
  })();
</script>
{{ end }}
